version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      # IMPORTANT: Don't mount checkpoints as volume - let Docker use the image's git-lfs pulled files
      # Volume mount would expose local git-lfs pointers (134B) instead of actual files
      # The Dockerfile handles git lfs pull to get real files in the image
      - ./processed_data:/app/processed_data:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
