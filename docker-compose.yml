version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      # NOTE: checkpoints/ is NOT mounted as a volume.
      # Model files are downloaded from Google Drive during Docker build
      # and are baked directly into the image under /app/checkpoints/.
      # Mounting a local volume here would overwrite them with empty/missing files.
      - ./processed_data:/app/processed_data:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s