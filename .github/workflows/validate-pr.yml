name: Validate Pull Requests

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'main.py'
      - 'test_api.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Code Changes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Syntax check - main.py
        run: |
          echo "[INFO] Validating main.py syntax..."
          python -m py_compile main.py
          echo "[OK] main.py syntax valid"
      
      - name: Syntax check - test_api.py
        run: |
          echo "[INFO] Validating test_api.py syntax..."
          python -m py_compile test_api.py
          echo "[OK] test_api.py syntax valid"
      
      - name: Check for disabled features
        run: |
          echo "[INFO] Checking for common issues..."
          ! grep -q "TODO.*critical" main.py || echo "[WARN] Found critical TODOs"
          ! grep -q "FIXME" main.py || echo "[WARN] Found FIXME markers"
          echo "[OK] Code quality checks passed"
      
      - name: Verify file structure
        run: |
          echo "[INFO] Verifying required files..."
          test -f main.py && echo "[OK] main.py" || (echo "[FAIL] main.py missing" && exit 1)
          test -f test_api.py && echo "[OK] test_api.py" || (echo "[FAIL] test_api.py missing" && exit 1)
          test -f requirements.txt && echo "[OK] requirements.txt" || (echo "[FAIL] requirements.txt missing" && exit 1)
          test -f Dockerfile && echo "[OK] Dockerfile" || (echo "[FAIL] Dockerfile missing" && exit 1)
          test -d checkpoints && echo "[OK] checkpoints/" || (echo "[FAIL] checkpoints/ missing" && exit 1)
      
      - name: Check model files
        run: |
          echo "[INFO] Checking model checkpoints..."
          test -f checkpoints/yolov7_plant_disease.torchscript.pt && echo "[OK] TorchScript model exists" || echo "[WARN] TorchScript model missing"
          test -f checkpoints/best_model.pt && echo "[OK] Fallback checkpoint exists" || echo "[WARN] Fallback checkpoint missing"
          test -f checkpoints/model_meta.json && echo "[OK] Model metadata exists" || (echo "[FAIL] Model metadata missing" && exit 1)
      
      - name: Security check
        run: |
          echo "[INFO] Running security checks..."
          ! grep -r "api_key\|password\|secret" main.py --include="*.py" || echo "[WARN] Found potential hardcoded secrets"
          echo "[OK] Security checks passed"
      
      - name: Docker build check
        run: |
          echo "[INFO] Validating Dockerfile syntax..."
          docker run --rm -i hadolint/hadolint < Dockerfile || echo "[WARN] Dockerfile issues (non-blocking)"
      
      - name: Report validation results
        run: |
          echo "[OK] All validation checks completed"
          echo "PR ready for review"
